<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo"><img src="Img/DineEase.png" alt="DineEase" /></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="reservation.html">Book a Table</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
            <button class="menu-toggle">&#9776;</button>
        </div>
    </header>
    <main class="reservation-content">

        <section class="reservation-hero">
            <div class="container">
                <h1 class="fade-in">Book Your Table</h1>
                <p class="fade-in">Reserve your dining experience with us today. We look forward to welcoming you!</p>
            </div>
        </section>

        <section class="booking-form-section">
            <div class="container fade-in">
                <h2>Make a Reservation</h2>
                <form action="/submit-reservation" method="POST" class="booking-form">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" min="2025-01-01" max="2026-12-31" required>

                    <label for="time">Time</label>
                    <input type="time" id="time" name="time" required>

                    <label for="guests">Number of Guests</label>
                    <select id="guests" name="guests" required>
                        <option value="1">1 Person</option>
                        <option value="2">2 People</option>
                        <option value="4">4 People</option>
                        <option value="6">6 People</option>
                        <option value="8">8+ People</option>
                    </select>
                    <button type="submit" class="submit-button">Confirm Reservation</button>
                </form>
            </div>
        </section>

    </main>
    <footer class="main-footer">
        <div class="container">
            <p class="footer-logo">Dine Ease</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="reservation.html">Reserve</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="copyright">
                <p>&copy; 2025 Dine Ease. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
